services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: burgerpos_dev
      POSTGRES_USER: burgerpos
      POSTGRES_PASSWORD: burgerpos_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U burgerpos -d burgerpos_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
